<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقرير الفني</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
@page { size: A4 portrait; margin: 8mm 12mm; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { max-width:100%; overflow-x:hidden; }
body {
  font-family:'Cairo',Arial,sans-serif;
  direction:rtl;
  background:#fff;
  color:#111;
  font-size:12px;
}
.page {
  width:210mm;
  max-width:100%;
  min-height:auto;
  margin:0 auto;
  padding:6mm 12mm;
}

/* MINISTRY BAR - own line at top, logo centered between the two ministry text lines, aligned right */
.ministry-bar {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  gap:2px;
  margin-bottom:2mm;
  text-align:right;
}
.ministry-bar img { width:50px; height:50px; object-fit:contain; mix-blend-mode:multiply; flex-shrink:0; }
.ministry-bar .mb-text { font-size:11px; font-weight:700; line-height:1.2; white-space:nowrap; text-align:right; }

/* HEADER (fields row) */
.header {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:4mm;
}
.header-right {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
}
.idara-line {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:700;
}
.idara-line input {
  border:none;
  border-bottom:1.3px solid #333;
  outline:none;
  font-family:'Cairo',Arial;
  font-size:12px;
  width:170px;
  background:transparent;
  padding:1px 4px;
}
.header-left {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}
.ref-line {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:700;
}
.ref-line span {
  min-width:50px;
  text-align:right;
}
.ref-line input {
  border:none;
  border-bottom:1.5px solid #333;
  outline:none;
  font-family:'Cairo',Arial;
  font-size:12px;
  width:140px;
  padding:1px 4px;
  background:transparent;
  text-align:right;
}

/* DIVIDER */
.full-line {
  border:none;
  border-bottom:1.5px solid #555;
  margin:2mm 0;
}
.full-line-thin {
  border:none;
  border-bottom:1px solid #aaa;
  margin:1.5mm 0;
}

/* TITLE */
.title-section {
  text-align:center;
  margin:3mm 0 4mm 0;
}
.title-section h1 {
  font-size:20px;
  font-weight:900;
  text-decoration:underline;
  text-underline-offset:5px;
  letter-spacing:2px;
  color:#111;
}

/* ADDRESS */
.address-line {
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-bottom:6px;
  font-size:12px;
  font-weight:700;
}
.address-line .to {
  white-space:nowrap;
}
.address-line input {
  border:none;
  border-bottom:1px solid #555;
  outline:none;
  font-family:'Cairo',Arial;
  font-size:12px;
  flex:1;
  padding:1px 4px;
  background:transparent;
}
.salute {
  font-size:12px;
  margin-bottom:3mm;
  margin-right:4px;
}

/* SUBJECT */
.subject-line {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:3mm;
  font-size:12.5px;
  font-weight:700;
}
.subject-line input {
  border:none;
  border-bottom:1.5px solid #333;
  outline:none;
  font-family:'Cairo',Arial;
  font-size:12.5px;
  flex:1;
  padding:1px 4px;
  background:transparent;
}

/* CONTENT TABLE */
.content-table {
  width:100%;
  border-collapse:collapse;
  margin-bottom:4mm;
}
.content-table td {
  border-bottom:1px solid #bbb;
  height:16px;
  vertical-align:bottom;
  padding:0 4px 1px 4px;
}
.content-table td.label {
  border-right:1.5px solid #555;
  font-size:12px;
  font-weight:700;
  width:110px;
  white-space:nowrap;
  vertical-align:top;
  padding:4px 8px;
}
.content-table td.write-area {
  width:auto;
}
.content-table input[type=text] {
  width:100%;
  border:none;
  outline:none;
  font-family:'Cairo',Arial;
  font-size:12px;
  background:transparent;
  padding:0 4px;
}

/* SIGNATURE */
.sig-row {
  display:flex;
  justify-content:space-between;
  margin-top:8mm;
  font-size:12px;
  font-weight:700;
}

/* PRINT */
@media print {
  .no-print { display:none !important; }
  body { font-size:12px; }
  * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
}

/* BUTTONS */
.btn-row {
  display:flex;
  gap:8px;
  margin-top:10px;
}
.btn {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-family:'Cairo',Arial;
  font-size:13px;
  font-weight:700;
}
.btn-print { background:linear-gradient(135deg,#1a5276,#2e86c1); color:#fff; }
.btn-clear { background:#fff; color:#c0392b; border:2px solid #e74c3c; flex:0 0 auto; padding:10px 16px; }

/* MOBILE RESPONSIVE */
@media screen and (max-width: 768px) {
  body { font-size:13px; background:#f5f5f5; }
  .page {
    width:100% !important;
    max-width:100% !important;
    min-height:auto !important;
    padding:10px 8px !important;
    margin:0 !important;
    box-shadow:none !important;
  }
  input, textarea, select {
    font-size:16px !important;
    max-width:100%;
  }
  .btn { padding:14px !important; font-size:15px !important; width:100%; }
  .btn-clear { padding:14px 20px !important; width:100%; }
  .header { flex-wrap:wrap; gap:10px; }
  .header-left input, .field-row input { width:100% !important; max-width:100%; }
  .sig-section { flex-direction:column; gap:15px; }
  table { width:100% !important; font-size:12px; }
  img { max-width:100%; height:auto; }
}
@media screen and (max-width: 480px) {
  body { font-size:12px; }
  .page { padding:8px 6px !important; }
}

</style>
</head>

<script>
function doPrint() {
  // Blur any focused input so it's included in print output on mobile
  if (document.activeElement && document.activeElement.blur) {
    document.activeElement.blur();
  }
  // iOS Safari sometimes needs a slight delay
  setTimeout(function() {
    try {
      window.print();
    } catch (e) {
      alert('الرجاء استخدام خيار الطباعة من القائمة في المتصفح لحفظ الملف كـ PDF');
    }
  }, 100);
}
function doClear() {
  if (confirm('مسح البيانات؟')) {
    document.querySelectorAll('input, textarea').forEach(function(e){ e.value = ''; });
  }
}
</script>
